openapi: 3.0.3
info:
  title: devm Control Plane API
  version: 0.1.0
  description: Public API used by the devm CLI and web application.
servers:
  - url: /v1
security:
  - workosBearer: []
paths:
  /me:
    get:
      summary: Get the authenticated user
      operationId: getCurrentUser
      responses:
        '200':
          description: Current product user.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        default:
          $ref: '#/components/responses/Error'
  /billing:
    get:
      summary: Get the user's billing summary
      operationId: getBillingSummary
      responses:
        '200':
          description: Subscription and shared credit balance.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingSummary'
        default:
          $ref: '#/components/responses/Error'
  /billing/portal:
    post:
      summary: Create a billing portal session
      operationId: createBillingPortal
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Short-lived Polar portal URL.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url: { type: string, format: uri }
        default:
          $ref: '#/components/responses/Error'
  /capsule-access:
    post:
      summary: Create Capsule access grants
      operationId: createCapsuleAccess
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CapsuleAccessRequest' }
      responses:
        '200':
          description: Short-lived owner-scoped Capsule access grants.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CapsuleAccessResponse' }
        default:
          $ref: '#/components/responses/Error'
  /capsules/{name}/tags/{tag}:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          pattern: '^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$'
      - name: tag
        in: path
        required: true
        schema:
          type: string
          pattern: '^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$'
    get:
      summary: Resolve an owned Capsule tag
      operationId: getCapsuleTag
      responses:
        '200':
          description: The current owner-scoped Capsule tag pointer.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CapsuleTag' }
        default:
          $ref: '#/components/responses/Error'
    put:
      summary: Publish an owned Capsule tag
      operationId: putCapsuleTag
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PutCapsuleTagRequest' }
      responses:
        '200':
          description: The current owner-scoped Capsule tag pointer. Publishing the same digest is idempotent; publishing a different digest retags it.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CapsuleTag' }
        default:
          $ref: '#/components/responses/Error'
  /ssh-keys:
    get:
      summary: List active SSH public keys
      operationId: listSSHKeys
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Active SSH public keys.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SSHKeyPage' }
        default:
          $ref: '#/components/responses/Error'
    post:
      summary: Register an SSH public key
      operationId: createSSHKey
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label, publicKey]
              properties:
                label: { type: string, minLength: 1, maxLength: 80 }
                publicKey: { type: string, minLength: 32, maxLength: 8192 }
      responses:
        '201':
          description: Stored public key.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SSHKey' }
        default:
          $ref: '#/components/responses/Error'
  /ssh-keys/{keyId}:
    delete:
      summary: Revoke an SSH public key
      operationId: revokeSSHKey
      parameters:
        - $ref: '#/components/parameters/KeyID'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Key revoked.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
        default:
          $ref: '#/components/responses/Error'
  /profiles:
    get:
      summary: List Profiles
      operationId: listProfiles
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Profiles owned by the user.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfilePage' }
        default:
          $ref: '#/components/responses/Error'
    post:
      summary: Create a Profile
      operationId: createProfile
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 80 }
                forkedFromVersionId: { type: string, nullable: true }
      responses:
        '201':
          description: Profile created.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileSummary' }
        default:
          $ref: '#/components/responses/Error'
  /profiles/{profileId}:
    get:
      summary: Get a Profile
      operationId: getProfile
      parameters:
        - $ref: '#/components/parameters/ProfileID'
      responses:
        '200':
          description: Profile and current head.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileSummary' }
        default:
          $ref: '#/components/responses/Error'
  /profiles/{profileId}/versions:
    post:
      summary: Publish a Profile Version
      operationId: publishProfileVersion
      parameters:
        - $ref: '#/components/parameters/ProfileID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [expectedHeadVersionId, capsuleRefs]
              properties:
                expectedHeadVersionId: { type: string, nullable: true }
                capsuleRefs:
                  type: array
                  items: { $ref: '#/components/schemas/CapsuleRef' }
      responses:
        '201':
          description: Immutable Profile Version published.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileVersion' }
        default:
          $ref: '#/components/responses/Error'
  /profile-versions/{versionId}:
    get:
      summary: Get a Profile Version
      operationId: getProfileVersion
      parameters:
        - name: versionId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Immutable Profile Version.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileVersion' }
        default:
          $ref: '#/components/responses/Error'
  /uploads:
    post:
      summary: Create an upload intent
      operationId: createUploadIntent
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, digest, sizeBytes]
              properties:
                kind: { type: string, enum: [profile_artifact, git_bundle, tracked_patch, untracked_bundle, seed_manifest] }
                digest: { type: string, pattern: '^sha256:[a-f0-9]{64}$' }
                sizeBytes: { type: integer, format: int64, minimum: 0 }
      responses:
        '201':
          description: Scoped upload URL.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema:
                type: object
                required: [uploadId, url, expiresAt, requiredHeaders]
                properties:
                  uploadId: { type: string }
                  url: { type: string, format: uri }
                  expiresAt: { type: string, format: date-time }
                  requiredHeaders:
                    type: object
                    minProperties: 1
                    maxProperties: 16
                    additionalProperties: { type: string, maxLength: 8192 }
        default:
          $ref: '#/components/responses/Error'
  /project-seeds:
    post:
      summary: Register a Project Seed
      operationId: createProjectSeed
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectSeedInput' }
      responses:
        '201':
          description: Immutable Project Seed registered.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema:
                type: object
                required: [id, digest]
                properties:
                  id: { type: string }
                  digest: { type: string }
        default:
          $ref: '#/components/responses/Error'
  /environments:
    get:
      summary: List Environments
      operationId: listEnvironments
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Environments owned by the user.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvironmentPage' }
        default:
          $ref: '#/components/responses/Error'
    post:
      summary: Create an Environment
      operationId: createEnvironment
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateEnvironmentInput' }
      responses:
        '202':
          description: Environment creation accepted.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvironmentOperation' }
        default:
          $ref: '#/components/responses/Error'
  /environments/{environmentId}:
    get:
      summary: Get an Environment
      operationId: getEnvironment
      parameters:
        - $ref: '#/components/parameters/EnvironmentID'
      responses:
        '200':
          description: Environment detail.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Environment' }
        default:
          $ref: '#/components/responses/Error'
    delete:
      summary: Delete an Environment
      operationId: deleteEnvironment
      parameters:
        - $ref: '#/components/parameters/EnvironmentID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmName]
              properties:
                confirmName: { type: string }
      responses:
        '202':
          description: Deletion accepted.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvironmentOperation' }
        default:
          $ref: '#/components/responses/Error'
  /environments/{environmentId}/start:
    post:
      summary: Start an Environment Runtime
      operationId: startEnvironmentRuntime
      parameters:
        - $ref: '#/components/parameters/EnvironmentID'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Runtime start accepted.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvironmentOperation' }
        default:
          $ref: '#/components/responses/Error'
  /environments/{environmentId}/stop:
    post:
      summary: Stop an Environment Runtime
      operationId: stopEnvironmentRuntime
      parameters:
        - $ref: '#/components/parameters/EnvironmentID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string, enum: [manual] }
      responses:
        '202':
          description: Runtime stop accepted.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvironmentOperation' }
        default:
          $ref: '#/components/responses/Error'
  /environments/{environmentId}/replace-runtime:
    post:
      summary: Replace an Environment Runtime
      operationId: replaceEnvironmentRuntime
      parameters:
        - $ref: '#/components/parameters/EnvironmentID'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Runtime replacement accepted.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvironmentOperation' }
        default:
          $ref: '#/components/responses/Error'
  /environments/{environmentId}/apply-profile:
    post:
      summary: Apply a Profile Version to an Environment
      operationId: applyEnvironmentProfile
      parameters:
        - $ref: '#/components/parameters/EnvironmentID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [profileVersionId]
              properties:
                profileVersionId: { type: string }
                approvedReviewItems:
                  type: array
                  items: { type: string }
      responses:
        '202':
          description: Profile application accepted.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvironmentOperation' }
        default:
          $ref: '#/components/responses/Error'
  /environments/{environmentId}/auto-stop-policy:
    put:
      summary: Update an Environment's Auto-stop Policy
      operationId: updateAutoStopPolicy
      parameters:
        - $ref: '#/components/parameters/EnvironmentID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AutoStopPolicy' }
      responses:
        '202':
          description: Auto-stop policy update accepted.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvironmentOperation' }
        default:
          $ref: '#/components/responses/Error'
  /environments/{environmentId}/connection-intents:
    post:
      summary: Create a connection intent
      operationId: createConnectionIntent
      parameters:
        - $ref: '#/components/parameters/EnvironmentID'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '201':
          description: Short-lived regional proxy route.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConnectionIntent' }
        default:
          $ref: '#/components/responses/Error'
  /environments/{environmentId}/events:
    get:
      summary: List Environment events
      operationId: listEnvironmentEvents
      parameters:
        - $ref: '#/components/parameters/EnvironmentID'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Environment event timeline.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvironmentEventPage' }
        default:
          $ref: '#/components/responses/Error'
  /operations/{operationId}:
    get:
      summary: Get an Operation
      operationId: getOperation
      parameters:
        - name: operationId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Operation progress projection.
          headers:
            X-Request-ID: { $ref: '#/components/headers/RequestID' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Operation' }
        default:
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    workosBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 16, maxLength: 128 }
    EnvironmentID:
      name: environmentId
      in: path
      required: true
      schema: { type: string }
    ProfileID:
      name: profileId
      in: path
      required: true
      schema: { type: string }
    KeyID:
      name: keyId
      in: path
      required: true
      schema: { type: string }
    Cursor:
      name: cursor
      in: query
      required: false
      schema: { type: string, minLength: 1, maxLength: 512 }
    PageSize:
      name: pageSize
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
  headers:
    RequestID:
      description: Stable identifier for this API request.
      required: true
      schema: { type: string }
  responses:
    Error:
      description: Product-level error.
      headers:
        X-Request-ID: { $ref: '#/components/headers/RequestID' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  schemas:
    User:
      type: object
      required: [id, defaultRegion]
      properties:
        id: { type: string }
        defaultRegion: { type: string }
    BillingSummary:
      type: object
      required: [subscriptionStatus, creditBalance]
      properties:
        subscriptionStatus: { type: string }
        creditBalance: { type: integer, format: int64 }
        currentPeriodEnd: { type: string, format: date-time, nullable: true }
    SSHKey:
      type: object
      required: [id, label, algorithm, fingerprint, publicKey, createdAt]
      properties:
        id: { type: string }
        label: { type: string }
        algorithm: { type: string, enum: [ssh-ed25519] }
        fingerprint: { type: string }
        publicKey: { type: string }
        createdAt: { type: string, format: date-time }
    SSHKeyPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/SSHKey' }
        nextCursor: { type: string, nullable: true }
    ProfileSummary:
      type: object
      required: [id, name, slug]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        headVersionId: { type: string, nullable: true }
    ProfilePage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ProfileSummary' }
        nextCursor: { type: string, nullable: true }
    CapsuleRef:
      type: object
      required: [ref, freshnessPolicy]
      properties:
        ref:
          type: string
          minLength: 3
          pattern: '^owner/[A-Za-z0-9][A-Za-z0-9._-]{0,127}/[A-Za-z0-9][A-Za-z0-9._-]{0,127}(?::[A-Za-z0-9][A-Za-z0-9._-]{0,127}|@sha256:[a-f0-9]{64})$'
        freshnessPolicy:
          type: string
          enum: [track, review, pin]
        exclusions:
          type: array
          uniqueItems: true
          items: { type: string, minLength: 1, maxLength: 256 }
    ProfileVersion:
      type: object
      required: [id, profileId, version, digest, capsuleRefs, createdAt]
      properties:
        id: { type: string }
        profileId: { type: string }
        parentVersionId: { type: string, nullable: true }
        version: { type: integer, format: int64 }
        digest: { type: string, pattern: '^sha256:[a-f0-9]{64}$' }
        capsuleRefs:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/CapsuleRef' }
        createdAt: { type: string, format: date-time }
    ProjectSeedInput:
      type: object
      required: [repositoryUrl, baseRevision, digest, manifestDigest]
      properties:
        repositoryUrl: { type: string, format: uri }
        baseRevision: { type: string }
        digest: { type: string, pattern: '^sha256:[a-f0-9]{64}$' }
        gitBundleDigest: { type: string, nullable: true, pattern: '^sha256:[a-f0-9]{64}$' }
        trackedPatchDigest: { type: string, nullable: true, pattern: '^sha256:[a-f0-9]{64}$' }
        untrackedBundleDigest: { type: string, nullable: true, pattern: '^sha256:[a-f0-9]{64}$' }
        manifestDigest: { type: string, pattern: '^sha256:[a-f0-9]{64}$' }
    AutoStopPolicy:
      type: object
      required: [mode, gracePeriodSeconds]
      properties:
        mode:
          type: string
          enum: [when_disconnected, when_agents_finish, when_fully_idle, manual]
        gracePeriodSeconds: { type: integer, minimum: 0, maximum: 86400 }
    CreateEnvironmentInput:
      type: object
      required: [name, region, runtimePreset, profileVersionId, projectSeedId, autoStopPolicy, sshKeyIds]
      properties:
        name: { type: string, minLength: 3, maxLength: 64 }
        region: { type: string }
        runtimePreset: { type: string }
        profileVersionId: { type: string }
        projectSeedId: { type: string }
        autoStopPolicy: { $ref: '#/components/schemas/AutoStopPolicy' }
        sshKeyIds:
          type: array
          minItems: 1
          items: { type: string }
    Runtime:
      type: object
      required: [id, status, runtimePreset, region, availabilityZone, imageVersion]
      properties:
        id: { type: string }
        status:
          type: string
          enum: [absent, provisioning, starting, ready, stopping, stopped, replacing, error]
        runtimePreset: { type: string }
        region: { type: string }
        availabilityZone: { type: string }
        imageVersion: { type: string }
    Environment:
      type: object
      required: [id, name, slug, lifecycle, health, region, runtimePreset, pinnedProfileVersionId, capsuleLockId, autoStopPolicy, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        lifecycle: { type: string, enum: [creating, active, deleting, deleted] }
        health: { type: string, enum: [healthy, degraded, blocked, unknown] }
        region: { type: string }
        runtimePreset: { type: string }
        pinnedProfileVersionId: { type: string }
        capsuleLockId: { type: string, nullable: true }
        capsuleLock: { $ref: '#/components/schemas/CapsuleLock' }
        autoStopPolicy: { $ref: '#/components/schemas/AutoStopPolicy' }
        runtime: { $ref: '#/components/schemas/Runtime' }
        activeOperationId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
    LockedCapsule:
      type: object
      required: [ref, digest]
      properties:
        ref: { type: string }
        digest: { type: string, pattern: '^sha256:[a-f0-9]{64}$' }
    CapsuleLock:
      type: object
      required: [id, digest, profileVersionId, projectCapsuleDigest, capsules]
      properties:
        id: { type: string }
        digest: { type: string, pattern: '^sha256:[a-f0-9]{64}$' }
        profileVersionId: { type: string }
        projectCapsuleDigest: { type: string, pattern: '^sha256:[a-f0-9]{64}$' }
        capsules:
          type: array
          items: { $ref: '#/components/schemas/LockedCapsule' }
    CapsuleAccessRequest:
      type: object
      required: [intent, objects]
      properties:
        intent:
          type: string
          enum: [pull, push]
        objects:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/CapsuleAccessObject' }
    CapsuleAccessObject:
      type: object
      description: One owner-scoped OCI object. index maps to IndexKey, manifest to ManifestKey, and blob to BlobKey.
      required: [kind, digest]
      properties:
        kind:
          type: string
          enum: [index, manifest, blob]
        digest: { type: string, pattern: '^sha256:[a-f0-9]{64}$' }
    CapsuleAccessGrant:
      type: object
      required: [url, method, headers, expiresAt]
      properties:
        url: { type: string, format: uri }
        method: { type: string, enum: [GET, PUT] }
        headers:
          type: object
          additionalProperties: { type: string, maxLength: 8192 }
        expiresAt: { type: string, format: date-time }
    CapsuleAccessResponse:
      type: object
      required: [grants]
      properties:
        grants:
          type: array
          items: { $ref: '#/components/schemas/CapsuleAccessGrant' }
    PutCapsuleTagRequest:
      type: object
      required: [digest]
      properties:
        digest: { type: string, pattern: '^sha256:[a-f0-9]{64}$' }
    CapsuleTag:
      type: object
      required: [name, tag, digest, updatedAt]
      properties:
        name: { type: string }
        tag: { type: string }
        digest: { type: string, pattern: '^sha256:[a-f0-9]{64}$' }
        updatedAt: { type: string, format: date-time }
    EnvironmentOperation:
      type: object
      required: [environment, operation]
      properties:
        environment: { $ref: '#/components/schemas/Environment' }
        operation: { $ref: '#/components/schemas/Operation' }
    EnvironmentPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Environment' }
        nextCursor: { type: string, nullable: true }
    EnvironmentEvent:
      type: object
      required: [id, environmentId, type, summary, createdAt]
      properties:
        id: { type: string }
        environmentId: { type: string }
        operationId: { type: string, nullable: true }
        type: { type: string }
        summary: { type: string }
        createdAt: { type: string, format: date-time }
    EnvironmentEventPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/EnvironmentEvent' }
        nextCursor: { type: string, nullable: true }
    OperationStep:
      type: object
      required: [stepKey, status, summary]
      properties:
        stepKey: { type: string }
        status: { type: string, enum: [pending, running, succeeded, failed, skipped, blocked] }
        summary: { type: string }
    Operation:
      type: object
      required: [id, environmentId, type, status, steps, createdAt]
      properties:
        id: { type: string }
        environmentId: { type: string }
        type: { type: string }
        status: { type: string, enum: [queued, running, succeeded, failed, cancelled, blocked] }
        steps:
          type: array
          items: { $ref: '#/components/schemas/OperationStep' }
        createdAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time, nullable: true }
    ConnectionIntent:
      type: object
      required: [id, environmentId, logicalHostname, proxyUrl, expiresAt]
      properties:
        id: { type: string }
        environmentId: { type: string }
        logicalHostname: { type: string }
        proxyUrl: { type: string, format: uri }
        operationId: { type: string, nullable: true }
        expiresAt: { type: string, format: date-time }
    ErrorResponse:
      type: object
      required: [requestId, error]
      properties:
        requestId: { type: string }
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            operationId: { type: string, nullable: true }
            safeState: { type: string, nullable: true }
            nextAction: { type: string, nullable: true }
